version: 2.1
jobs:
  test:
    docker:
      # - image: circleci/node:latest
      - image: cimg/node:22.22.0
    steps:
      - checkout
      - run:
          name: node version
          command: node -v
      - run:
          name: npm version
          command: npm -v
      # - run:
      #     name: Update npm
      #     command: 'sudo npm install -g npm@latest'
      # - run:
      #     name: configure npm for private modules
      #     command: |
      #       npm config set //registry.npmjs.org/:_authToken=$NPM_TOKEN
      #       npm whoami
      # - restore_cache:
      #     key: dependency-cache-{{ checksum "package.json" }}
      - run:
          name: install npm packages
          command: npm ci
      # - run:
      #     name: Force Install Rollup Linux Binary
      #     # CI環境（Linux x64）に必要なバイナリを明示的に追加
      #     command: npm install @rollup/rollup-linux-x64-gnu --no-save
      - run:
          name: Force Install Rolldown Linux Binary
          # @rollup ではなく @rolldown のバイナリを明示的に指定
          command: npm install @rolldown/binding-linux-x64-gnu --no-save
      - save_cache:
          key: dependency-cache-{{ checksum "package.json" }}
          paths:
            - ./node_modules
      - run:
          name: compile typescript
          command: npm run build
      # - run:
      #     name: check dependencies (dependency-cruiser)
      #     command: npm run depcruise
      # - run:
      #     name: run size limit
      #     command: npm run size
      - run:
          name: run npm test
          command: npm test
  prerelease:
    docker:
      - image: cimg/node:22.22.0
    steps:
      - checkout
      # - restore_cache:
      #     key: dependency-cache-{{ checksum "package.json" }}
      - run:
          name: install npm packages
          command: npm ci
      - run:
          name: NPM login
          command: |
            npm config set //registry.npmjs.org/:_authToken=$NPM_TOKEN
            npm whoami
      #   - run:
      #       command: npm version 1.0.0-alpha.$CIRCLE_BUILD_NUM
      - run:
          command: npm publish --tag next --access public
  deploy:
    docker:
      - image: cimg/node:22.22.0
    steps:
      - checkout
      # - restore_cache:
      #     key: dependency-cache-{{ checksum "package.json" }}
      - run:
          name: install npm packages
          command: npm ci
      - run:
          name: NPM login
          command: |
            npm config set //registry.npmjs.org/:_authToken=$NPM_TOKEN
            npm whoami
      - run:
          command: npm publish --access public
# Used for orchestrating all jobs.
workflows:
  version: 2
  build-test-and-deploy:
    jobs:
      - test
      - prerelease:
          requires:
            - test
          filters:
            branches:
              only: /feature\/.+-alpha.+/
      - deploy:
          requires:
            - test
          filters:
            branches:
              only: master
